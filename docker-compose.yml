version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: production_control_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: production_control
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: production_control_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: production_control_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: